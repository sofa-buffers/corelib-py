name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Official GitHub Pages deployment (no gh-pages branch): build the docs as an
# artifact and deploy it straight to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build API docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install package and Sphinx
        run: python -m pip install -e . sphinx

      - name: Build API docs (Sphinx)
        run: |
          sphinx-apidoc -o docs -f -e src/sofab
          sphinx-build -b html docs site

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
